# PrintCardFlow — CI: build Windows .exe
name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows .exe
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - name: Install Visual C++ Build Tools
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install dependencies (skip postinstall)
        run: bun install --ignore-scripts

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Push DB schema
        run: bun run db:push
        env:
          DATABASE_URL: "file:db/custom.db"

      - name: Build Next.js
        run: bun run build:next
        env:
          DATABASE_URL: "file:db/custom.db"

      - name: Build Electron (Windows .exe)
        run: bunx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: "file:db/custom.db"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrintCardFlow-Windows
          path: dist/PrintCardFlow-Setup-*.exe
          if-no-files-found: warn
          retention-days: 30

  release:
    name: Publish to GitHub Releases
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: PrintCardFlow-Windows
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PrintCardFlow ${{ github.ref_name }}
          body: |
            ## PrintCardFlow ${{ github.ref_name }}

            ### Установка
            Скачайте `PrintCardFlow-Setup-*.exe` и запустите установщик.

            ### Изменения
            См. коммиты с предыдущего релиза.
          files: |
            artifacts/PrintCardFlow-Setup-*.exe
          draft: false
          prerelease: false
