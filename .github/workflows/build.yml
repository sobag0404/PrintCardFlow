# PrintCardFlow — CI: build Windows .exe + Linux .AppImage
name: Build Desktop Installers

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: PrintCardFlow-Setup-*.exe
            name: Windows
          - os: ubuntu-latest
            platform: linux
            artifact: PrintCardFlow-*.AppImage
            name: Linux

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - run: bun install
      - run: bun run db:generate
      - run: bun run db:push

      - name: Build Next.js
        run: bun run build:next
        env: { DATABASE_URL: "file:db/custom.db" }

      - name: Build Electron
        run: bunx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: "file:db/custom.db"

      - uses: actions/upload-artifact@v4
        with:
          name: PrintCardFlow-${{ matrix.name }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PrintCardFlow ${{ github.ref_name }}
          body: |
            ## PrintCardFlow ${{ github.ref_name }}
            - **Windows**: `PrintCardFlow-Setup-*.exe`
            - **Linux**: `PrintCardFlow-*.AppImage`
          files: |
            artifacts/PrintCardFlow-Windows/*
            artifacts/PrintCardFlow-Linux/*
